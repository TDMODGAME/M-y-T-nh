<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Máy Tính Hiện Đại</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-panel {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calc-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .calc-btn:active {
            transform: scale(0.92);
        }

        .display-screen {
            min-height: 80px;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <!-- Sidebar/Dashboard Info (Trái) -->
        <div class="md:col-span-4 space-y-6">
            <div class="glass-panel p-6 rounded-3xl shadow-xl">
                <div class="flex items-center justify-between mb-8">
                    <h1 class="text-2xl font-bold tracking-tight">Cài đặt</h1>
                    <button id="themeToggle" class="p-2 rounded-full bg-slate-200 dark:bg-slate-700 hover:bg-blue-500 hover:text-white transition-colors">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div class="p-4 bg-blue-50 dark:bg-blue-900/30 rounded-2xl border border-blue-100 dark:border-blue-800">
                        <p class="text-xs font-semibold text-blue-600 dark:text-blue-400 uppercase tracking-wider">Trạng thái hệ thống</p>
                        <p class="text-lg font-medium">Sẵn sàng tính toán</p>
                    </div>
                    
                    <div class="p-4 bg-purple-50 dark:bg-purple-900/30 rounded-2xl border border-purple-100 dark:border-purple-800">
                        <p class="text-xs font-semibold text-purple-600 dark:text-purple-400 uppercase tracking-wider">Tổng phép tính đã lưu</p>
                        <p id="totalOps" class="text-lg font-medium">0</p>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="glass-panel p-6 rounded-3xl shadow-xl h-64 md:h-[400px] flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold"><i class="fas fa-history mr-2"></i>Lịch sử</h2>
                    <button onclick="clearHistory()" class="text-xs text-red-500 hover:underline">Xóa hết</button>
                </div>
                <div id="historyList" class="overflow-y-auto flex-grow space-y-3 pr-2">
                    <p class="text-sm text-slate-500 italic text-center mt-10">Chưa có dữ liệu...</p>
                </div>
            </div>
        </div>

        <!-- Máy tính chính (Phải) -->
        <div class="md:col-span-8">
            <div class="glass-panel p-8 rounded-[40px] shadow-2xl relative overflow-hidden">
                <!-- Hiệu ứng trang trí -->
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-purple-500/10 rounded-full blur-3xl"></div>

                <!-- Màn hình hiển thị -->
                <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl mb-6 shadow-inner text-right border border-slate-200 dark:border-slate-700">
                    <div id="upperDisplay" class="text-slate-400 text-sm h-6 overflow-hidden"></div>
                    <div id="mainDisplay" class="text-4xl font-bold tracking-tighter mt-1 display-screen truncate">0</div>
                </div>

                <!-- Bàn phím máy tính -->
                <div class="grid grid-cols-4 gap-4">
                    <!-- Hàng 1 -->
                    <button onclick="clearAll()" class="calc-btn col-span-2 p-5 rounded-2xl bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400 font-bold hover:bg-red-200 dark:hover:bg-red-900/60">AC</button>
                    <button onclick="deleteLast()" class="calc-btn p-5 rounded-2xl bg-slate-200 dark:bg-slate-700 font-bold hover:bg-slate-300 dark:hover:bg-slate-600"><i class="fas fa-backspace"></i></button>
                    <button onclick="appendOperator('/')" class="calc-btn p-5 rounded-2xl bg-blue-500 text-white font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30">÷</button>
                    
                    <!-- Hàng 2 -->
                    <button onclick="appendNumber('7')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">7</button>
                    <button onclick="appendNumber('8')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">8</button>
                    <button onclick="appendNumber('9')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">9</button>
                    <button onclick="appendOperator('*')" class="calc-btn p-5 rounded-2xl bg-blue-500 text-white font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30">×</button>

                    <!-- Hàng 3 -->
                    <button onclick="appendNumber('4')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">4</button>
                    <button onclick="appendNumber('5')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">5</button>
                    <button onclick="appendNumber('6')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">6</button>
                    <button onclick="appendOperator('-')" class="calc-btn p-5 rounded-2xl bg-blue-500 text-white font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30">−</button>

                    <!-- Hàng 4 -->
                    <button onclick="appendNumber('1')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">1</button>
                    <button onclick="appendNumber('2')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">2</button>
                    <button onclick="appendNumber('3')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">3</button>
                    <button onclick="appendOperator('+')" class="calc-btn p-5 rounded-2xl bg-blue-500 text-white font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30">+</button>

                    <!-- Hàng 5 -->
                    <button onclick="appendNumber('0')" class="calc-btn col-span-2 p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">0</button>
                    <button onclick="appendNumber('.')" class="calc-btn p-5 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">.</button>
                    <button onclick="calculate()" class="calc-btn p-5 rounded-2xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-600/30">=</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetDisplay = false;
        let history = [];

        const mainDisplay = document.getElementById('mainDisplay');
        const upperDisplay = document.getElementById('upperDisplay');
        const historyList = document.getElementById('historyList');
        const totalOps = document.getElementById('totalOps');
        const themeToggle = document.getElementById('themeToggle');

        // Dark mode toggle
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        function updateDisplay() {
            mainDisplay.innerText = currentInput;
            if (operator) {
                upperDisplay.innerText = `${previousInput} ${operator}`;
            } else {
                upperDisplay.innerText = '';
            }
        }

        function appendNumber(num) {
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            operator = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetDisplay) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) {
                        alert("Không thể chia cho 0!");
                        clearAll();
                        return;
                    }
                    result = prev / current; 
                    break;
                default: return;
            }

            const expression = `${previousInput} ${operator} ${currentInput} =`;
            const finalResult = parseFloat(result.toFixed(8)).toString();

            addHistory(expression, finalResult);
            
            currentInput = finalResult;
            operator = null;
            previousInput = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function addHistory(exp, res) {
            history.unshift({ exp, res });
            if (history.length > 20) history.pop();
            renderHistory();
        }

        function renderHistory() {
            totalOps.innerText = history.length;
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-sm text-slate-500 italic text-center mt-10">Chưa có dữ liệu...</p>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="p-3 bg-slate-50 dark:bg-slate-800/40 rounded-xl border border-slate-100 dark:border-slate-700 animate-fade-in">
                    <div class="text-[10px] text-slate-400 font-medium uppercase">${item.exp}</div>
                    <div class="text-sm font-bold text-blue-600 dark:text-blue-400">${item.res}</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        // Bắt sự kiện bàn phím
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') appendOperator('/');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
